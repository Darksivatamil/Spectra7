services:
  - type: web
    name: spectra7
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python spectra7.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
