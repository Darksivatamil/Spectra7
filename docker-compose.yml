version: "3.9"

services:
  spectra7:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    profiles:
      - redis
